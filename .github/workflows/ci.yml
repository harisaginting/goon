name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

# Cancel older runs of the same branch when a new one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.21", "1.22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod tidy (no diff)
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (race, count=1)
        run: go test -race -count=1 -timeout 5m ./...

  build:
    name: build + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # Real version stamp from git, mirroring `make build` locally.
      # bash on windows-latest is provided by Git for Windows.
      - name: build
        shell: bash
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MOD=github.com/harisaginting/goon
          EXE=goon
          if [ "$RUNNER_OS" = "Windows" ]; then EXE=goon.exe; fi
          go build -trimpath -ldflags "-s -w \
            -X $MOD/cmd.version=$VERSION \
            -X $MOD/cmd.commit=$COMMIT \
            -X $MOD/cmd.date=$DATE" \
            -o "$EXE" .

      - name: smoke test (mock provider, --version)
        shell: bash
        env:
          GOON_LLM_PROVIDER: mock
          GOON_MOCK_REPLIES: '{"tool":"finish","args":{"message":"ci-ok"}}'
        run: |
          EXE=./goon
          if [ "$RUNNER_OS" = "Windows" ]; then EXE=./goon.exe; fi
          $EXE --version
          $EXE "smoke test" --auto

  static:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat:"
            echo "$out"
            exit 1
          fi

      # govulncheck flags known CVEs in the stdlib + dependencies. With
      # zero third-party deps this mostly catches stdlib regressions —
      # still the right floor for a public binary.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint-examples:
    name: validate example workflow JSONs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: jq parse + minimal schema
        run: |
          for f in examples/workflows/*.json workflow.json.sample; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            jq empty "$f"
            jq -e '.stages | length > 0' "$f" > /dev/null
            jq -e 'all(.stages[]; .name and .type and (.type == "llm" or .type == "agent"))' "$f" > /dev/null
          done

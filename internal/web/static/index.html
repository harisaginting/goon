<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>goon — dashboard</title>

<!-- Tailwind via Play CDN. Single-binary "zero deps" applies to the Go
     build; the in-browser stylesheet is cached aggressively and the
     page degrades gracefully (functional, unstyled) when offline. -->
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
  tailwind.config = {
    darkMode: 'media',
    theme: {
      extend: {
        colors: {
          accent: {
            DEFAULT: '#58a6ff',
            soft:    '#1f6feb22',
            ring:    '#58a6ff66',
          },
          surface: {
            DEFAULT: '#0d1117',
            raised:  '#161b22',
            sunken:  '#0a0d12',
            border:  '#21262d',
          },
        },
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          mono: ['ui-monospace', 'SF Mono', 'JetBrains Mono', 'Menlo', 'Consolas', 'monospace'],
        },
        boxShadow: {
          'card': '0 1px 2px 0 rgb(0 0 0 / 0.04), 0 1px 3px 0 rgb(0 0 0 / 0.04)',
          'lift': '0 4px 12px -2px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.04)',
          'glow': '0 0 0 4px rgb(88 166 255 / 0.15)',
        },
        animation: {
          'fade-in':    'fadeIn 200ms ease-out both',
          'slide-up':   'slideUp 240ms cubic-bezier(0.16, 1, 0.3, 1) both',
          'pulse-dot':  'pulseDot 2s ease-in-out infinite',
          'spin-slow':  'spin 1.4s linear infinite',
          'shimmer':    'shimmer 1.6s linear infinite',
        },
        keyframes: {
          fadeIn:   { '0%': { opacity: 0 },                    '100%': { opacity: 1 } },
          slideUp:  { '0%': { opacity: 0, transform: 'translateY(6px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          pulseDot: { '0%, 100%': { opacity: 1 },              '50%': { opacity: 0.4 } },
          shimmer:  { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
        },
      },
    },
  };
</script>

<!-- Preconnect to the Inter font CDN; falls back to system if blocked. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

<script src="/htmx.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  /* Subtle gradient on page background — light enough to feel modern,
     not so loud it competes with content. */
  html.dark, html:not(.dark) body { background-attachment: fixed; }
  html.dark body { background-image: radial-gradient(ellipse at top, #161b2240 0%, transparent 70%); }

  /* Custom scrollbars. */
  .scrollbar-thin::-webkit-scrollbar { width: 10px; height: 10px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(120,128,148,0.18); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(120,128,148,0.32); background-clip: padding-box; border: 2px solid transparent; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }

  /* htmx loading indicator. */
  .htmx-indicator { opacity: 0; transition: opacity 200ms; }
  .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

  /* Tab active state via aria-current. */
  [aria-current="page"] {
    color: #58a6ff !important;
    border-bottom-color: #58a6ff !important;
  }
  @media (prefers-color-scheme: dark) {
    [aria-current="page"] { color: #79c0ff !important; border-bottom-color: #79c0ff !important; }
  }

  /* Status dot pulse for "running". */
  .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }
  @keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(1.15); } }

  /* Loading skeleton — neutral shimmering bar. */
  .skel {
    background: linear-gradient(90deg,
      rgba(120,128,148,0.10) 25%,
      rgba(120,128,148,0.18) 37%,
      rgba(120,128,148,0.10) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.6s linear infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* Toast entry/exit. */
  @keyframes toast-in  { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toast-out { from { opacity: 1; transform: translateX(0); }   to { opacity: 0; transform: translateX(8px); } }
  .toast       { animation: toast-in  200ms ease-out both; }
  .toast.gone  { animation: toast-out 220ms ease-in  both; }

  /* Command palette. */
  .cmdk-overlay { animation: fadeIn 120ms ease-out both; }
  .cmdk-panel   { animation: slideUp 200ms cubic-bezier(0.16, 1, 0.3, 1) both; }

  /* Kbd visual. */
  kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 1.5em; height: 1.5em; padding: 0 0.35em;
    border: 1px solid rgba(120, 128, 148, 0.3);
    border-bottom-width: 2px;
    border-radius: 4px;
    font: 0.72rem ui-monospace, "SF Mono", Menlo, monospace;
    background: rgba(255, 255, 255, 0.04);
    color: inherit;
  }

  /* Smooth swap of tab content. */
  #tab-content > * { animation: fadeIn 180ms ease-out both; }

  /* Hide htmx outerHTML target during request to prevent flash. */
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>

<!-- ===== Command palette ================================================= -->
<div id="cmdk" class="hidden fixed inset-0 z-50">
  <div class="cmdk-overlay absolute inset-0 bg-gray-900/40 dark:bg-black/60 backdrop-blur-sm" onclick="closeCmdk()"></div>
  <div class="cmdk-panel absolute top-24 left-1/2 -translate-x-1/2 w-full max-w-xl rounded-xl border border-gray-200 dark:border-surface-border bg-white dark:bg-surface-raised shadow-2xl overflow-hidden">
    <div class="flex items-center gap-2 px-4 py-3 border-b border-gray-200 dark:border-surface-border">
      <svg class="h-4 w-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" /></svg>
      <input id="cmdk-input" type="text" placeholder="Search commands, tabs, tickets…"
             autocomplete="off" autocorrect="off" spellcheck="false"
             class="flex-1 bg-transparent text-sm focus:outline-none placeholder:text-gray-400">
      <kbd>esc</kbd>
    </div>
    <ul id="cmdk-results" class="max-h-80 overflow-y-auto scrollbar-thin py-2" role="listbox"></ul>
    <div class="px-4 py-2 border-t border-gray-200 dark:border-surface-border bg-gray-50 dark:bg-surface-sunken text-xs text-gray-500 flex items-center gap-3">
      <span class="flex items-center gap-1"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span class="flex items-center gap-1"><kbd>↵</kbd> open</span>
      <span class="flex items-center gap-1"><kbd>esc</kbd> close</span>
    </div>
  </div>
</div>

<script>
  // -------- Tab activation ------------------------------------------------
  function setActiveTab(btn) {
    document.querySelectorAll('button.tab').forEach(b => b.removeAttribute('aria-current'));
    btn.setAttribute('aria-current', 'page');
  }

  // -------- Keyboard shortcuts -------------------------------------------
  // 1-7: switch tabs. /: focus search (cmdk). ?: open docs in new tab.
  document.addEventListener('keydown', (e) => {
    // Skip when typing in inputs/textareas (so users can type "1" into a search).
    const inField = e.target instanceof HTMLElement &&
      (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable);
    // Cmd-K / Ctrl-K opens palette regardless.
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); openCmdk(); return;
    }
    if (inField) return;
    if (e.key >= '1' && e.key <= '7') {
      const btn = document.querySelector(`button.tab[data-shortcut="${e.key}"]`);
      if (btn) { btn.click(); e.preventDefault(); }
    } else if (e.key === '/') {
      e.preventDefault(); openCmdk();
    } else if (e.key === '?') {
      e.preventDefault(); window.open('/docs', '_blank');
    } else if (e.key === 'Escape') {
      closeCmdk();
    }
  });

  // -------- Command palette ----------------------------------------------
  const cmdkActions = [
    { label: 'Overview',      hint: 'Tab 1',     run: () => clickTab('overview') },
    { label: 'Tickets',       hint: 'Tab 2',     run: () => clickTab('tickets') },
    { label: 'Workflows',     hint: 'Tab 3',     run: () => clickTab('workflows') },
    { label: 'Questions',     hint: 'Tab 4',     run: () => clickTab('questions') },
    { label: 'Chat',          hint: 'Tab 5',     run: () => clickTab('chat') },
    { label: 'Knowledge',     hint: 'Tab 6',     run: () => clickTab('knowledge') },
    { label: 'Configuration', hint: 'Tab 7',     run: () => clickTab('config') },
    { label: 'Refresh tickets from board', hint: 'POST /api/refresh', run: doRefresh },
    { label: 'Pause daemon',  hint: 'POST /api/daemon/pause',   run: () => doDaemon('pause') },
    { label: 'Resume daemon', hint: 'POST /api/daemon/resume',  run: () => doDaemon('resume') },
    { label: 'Open documentation', hint: 'docs', run: () => window.open('/docs', '_blank') },
  ];

  function clickTab(name) {
    const btn = document.querySelector(`button.tab[data-tab="${name}"]`);
    if (btn) btn.click();
    closeCmdk();
  }
  async function doRefresh() {
    closeCmdk();
    const r = await fetch('/api/refresh', { method: 'POST' });
    if (r.ok) toast('refreshed tickets from board', 'ok');
    else toast('refresh failed', 'err');
  }
  async function doDaemon(action) {
    closeCmdk();
    const r = await fetch('/api/daemon/' + action, { method: 'POST' });
    if (r.ok) toast('daemon ' + action + (action.endsWith('e') ? 'd' : 'ed'), 'ok');
    else toast(action + ' failed', 'err');
  }

  function openCmdk() {
    document.getElementById('cmdk').classList.remove('hidden');
    document.getElementById('cmdk-input').value = '';
    document.getElementById('cmdk-input').focus();
    renderCmdk('');
  }
  function closeCmdk() { document.getElementById('cmdk').classList.add('hidden'); }
  document.getElementById('cmdk-open').addEventListener('click', openCmdk);

  let cmdkIdx = 0;
  function renderCmdk(query) {
    const q = query.toLowerCase();
    const results = cmdkActions.filter(a => !q || a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q));
    cmdkIdx = 0;
    const ul = document.getElementById('cmdk-results');
    if (results.length === 0) {
      ul.innerHTML = '<li class="px-4 py-3 text-sm text-gray-500">no matches</li>';
      return;
    }
    ul.innerHTML = results.map((a, i) => `
      <li role="option" data-i="${i}" class="cmdk-item flex items-center justify-between px-4 py-2 cursor-pointer ${i === 0 ? 'bg-accent-soft text-accent' : 'hover:bg-gray-100 dark:hover:bg-gray-800/50'}">
        <span class="text-sm">${escapeHtml(a.label)}</span>
        <span class="text-xs text-gray-400 font-mono">${escapeHtml(a.hint)}</span>
      </li>`).join('');
    ul.querySelectorAll('.cmdk-item').forEach((el) => {
      el.addEventListener('click', () => results[+el.dataset.i].run());
      el.addEventListener('mouseenter', () => moveCmdk(+el.dataset.i, results));
    });
  }
  function moveCmdk(i, results) {
    cmdkIdx = i;
    document.querySelectorAll('.cmdk-item').forEach((el, idx) => {
      if (idx === i) el.classList.add('bg-accent-soft','text-accent');
      else el.classList.remove('bg-accent-soft','text-accent');
    });
  }
  document.getElementById('cmdk-input').addEventListener('input', (e) => renderCmdk(e.target.value));
  document.getElementById('cmdk-input').addEventListener('keydown', (e) => {
    const items = document.querySelectorAll('.cmdk-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); if (cmdkIdx < items.length - 1) moveCmdk(cmdkIdx + 1, cmdkActionsFiltered()); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); if (cmdkIdx > 0)                 moveCmdk(cmdkIdx - 1, cmdkActionsFiltered()); }
    if (e.key === 'Enter')     { e.preventDefault(); const r = cmdkActionsFiltered(); if (r[cmdkIdx]) r[cmdkIdx].run(); }
    if (e.key === 'Escape')    { closeCmdk(); }
  });
  function cmdkActionsFiltered() {
    const q = document.getElementById('cmdk-input').value.toLowerCase();
    return cmdkActions.filter(a => !q || a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q));
  }
  function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // -------- Toast notifications ------------------------------------------
  function toast(message, kind) {
    const tone = {
      ok:    'bg-emerald-500/10 text-emerald-700 dark:text-emerald-300 border-emerald-500/30',
      err:   'bg-rose-500/10    text-rose-700    dark:text-rose-300    border-rose-500/30',
      warn:  'bg-amber-500/10   text-amber-700   dark:text-amber-300   border-amber-500/30',
      info:  'bg-sky-500/10     text-sky-700     dark:text-sky-300     border-sky-500/30',
    }[kind || 'info'];
    const icon = { ok: '✓', err: '✗', warn: '⚠', info: 'ⓘ' }[kind || 'info'];
    const el = document.createElement('div');
    el.className = `toast pointer-events-auto rounded-lg border px-3.5 py-2.5 text-sm shadow-lift backdrop-blur flex items-center gap-2.5 ${tone}`;
    el.innerHTML = `<span class="text-base leading-none">${icon}</span><span class="flex-1">${escapeHtml(message)}</span>`;
    document.getElementById('toast-stack').appendChild(el);
    setTimeout(() => {
      el.classList.add('gone');
      setTimeout(() => el.remove(), 280);
    }, 3200);
  }

  // -------- HX-Trigger event → toast mapping -----------------------------
  document.body.addEventListener('statusChanged',     () => toast('daemon state changed',  'info'));
  document.body.addEventListener('questionsChanged',  () => toast('answer recorded',       'ok'));
  document.body.addEventListener('configChanged',     () => toast('config saved',          'ok'));
  document.body.addEventListener('ticketsChanged',    () => toast('ticket snapshot refreshed', 'ok'));
  document.body.addEventListener('configError',  (e) => toast(e.detail?.message || 'config error', 'err'));
</script>

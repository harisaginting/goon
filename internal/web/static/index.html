<!-- Theme bootstrap — runs before paint so there's no flash of the wrong theme. -->
<script>
  (function(){
    function apply(pref){
      var dark = pref === 'dark' || (pref !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
      var el = document.documentElement;
      el.classList.remove('dark','light');
      el.classList.add(dark ? 'dark' : 'light');
      el.setAttribute('data-theme-pref', pref);
      var meta = document.querySelector('meta[name=theme-color]');
      if (meta) meta.setAttribute('content', dark ? '#0D1117' : '#F7F8FA');
    }
    var pref;
    try { pref = localStorage.getItem('goon-theme') || 'system'; } catch(e) { pref = 'system'; }
    apply(pref);
    // Expose a cycler: system → light → dark → system.
    window.goonCycleTheme = function(){
      var cur;
      try { cur = localStorage.getItem('goon-theme') || 'system'; } catch(e) { cur = 'system'; }
      var next = cur === 'system' ? 'light' : cur === 'light' ? 'dark' : 'system';
      try { localStorage.setItem('goon-theme', next); } catch(e){}
      apply(next);
      if (window.goonSyncThemeButton) window.goonSyncThemeButton(next);
    };
    // Follow the OS when in "system" mode.
    try {
      matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(){
        var p; try { p = localStorage.getItem('goon-theme') || 'system'; } catch(e){ p='system'; }
        if (p === 'system') apply('system');
      });
    } catch(e){}
  })();
</script>

<!--
  Design system — dark by default.

  Palette:
    accent    → Indigo #6366F1   (active states, links, focus rings only)
    success   → Emerald #10B981  (done, healthy)
    warning   → Amber #F59E0B    (pending gates, needs attention)
    danger    → Rose #F43F5E     (errors, blocked)
    surface   → Slate #0D1117   (GitHub-dark — near-black with blue-grey warmth)
    muted     → Slate #8B949E   (secondary text)
    text      → #E6EDF3         (primary text — not pure white, easier on eyes)

  Rules:
    • accent only on interactive/active states — never decorative
    • no glow, no neon, no background gradients
    • borders only where they carry meaning (table rows, input outlines)
    • spacing creates hierarchy, not dividers
    • status colors only for workflow states
-->
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          // All colors are CSS variables (space-separated RGB) so the whole
          // app flips between light + dark by swapping the vars on <html>.
          accent: {
            DEFAULT: 'rgb(var(--c-accent) / <alpha-value>)',
            soft:    'rgb(var(--c-accent) / 0.10)',
            ring:    'rgb(var(--c-accent) / 0.30)',
            strong:  'rgb(var(--c-accent-strong) / <alpha-value>)',
          },
          highlight: {
            DEFAULT: 'rgb(var(--c-highlight) / <alpha-value>)',
            soft:    'rgb(var(--c-highlight) / 0.12)',
          },
          surface: {
            DEFAULT: 'rgb(var(--c-surface) / <alpha-value>)',
            raised:  'rgb(var(--c-surface-raised) / <alpha-value>)',
            sunken:  'rgb(var(--c-surface-sunken) / <alpha-value>)',
            border:  'rgb(var(--c-surface-border) / <alpha-value>)',
          },
          success: 'rgb(var(--c-success) / <alpha-value>)',
          danger:  'rgb(var(--c-danger) / <alpha-value>)',
          muted: 'rgb(var(--c-muted) / <alpha-value>)',
          ink:   'rgb(var(--c-ink) / <alpha-value>)',
        },
        fontFamily: {
          // Native Apple-first system stack — feels native on macOS/iOS, with
          // graceful fallbacks elsewhere. No web-font fetch.
          sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', 'Inter', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'],
          mono: ['ui-monospace', '"SF Mono"', '"JetBrains Mono"', 'Menlo', 'Consolas', 'monospace'],
        },
        borderRadius: {
          // Slightly larger, Apple-ish rounding across the board.
          'md': '0.5rem',   // 8
          'lg': '0.625rem', // 10
          'xl': '0.875rem', // 14
          '2xl': '1.125rem',// 18
        },
        boxShadow: {
          'card': 'var(--shadow-card)',
          'lift': 'var(--shadow-lift)',
          'ring': '0 0 0 3px rgb(var(--c-accent) / 0.30)',
        },
        animation: {
          'fade-in':   'fadeIn 160ms ease-out both',
          'slide-up':  'slideUp 200ms cubic-bezier(0.16, 1, 0.3, 1) both',
          'spin-slow': 'spin 1.2s linear infinite',
          'shimmer':   'shimmer 1.8s linear infinite',
        },
        keyframes: {
          fadeIn:  { '0%': { opacity: 0 },                          '100%': { opacity: 1 } },
          slideUp: { '0%': { opacity: 0, transform: 'translateY(4px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          shimmer: { '0%': { backgroundPosition: '-200% 0' },       '100%': { backgroundPosition: '200% 0' } },
        },
      },
    },
  };
</script>

<script src="/htmx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/idiomorph/0.7.3/idiomorph-ext.min.js"></script>
<script>
  (function() {
    if (typeof EventSource === 'undefined') return;
    function bind() {
      const es = new EventSource('/api/events');
      ['statusChanged','questionsChanged','workflowsChanged','workflowDetailRefresh',
       'ticketsChanged','prsChanged','configChanged','memoryChanged','skillsChanged'
      ].forEach(function(name) {
        es.addEventListener(name, function() {
          document.body.dispatchEvent(new Event(name));
        });
      });
      es.onerror = function() {
        if (es.readyState === 2) setTimeout(bind, 5000);
      };
    }
    bind();
  })();
</script>
<style>
  /* ── Design tokens — flipped by the .dark / .light class on <html> ──────
     Values are space-separated RGB triplets so Tailwind's
     rgb(var(--x) / <alpha-value>) can apply opacity. */

  /* Light theme (Apple-clean: soft off-white base, white cards, hairlines). */
  :root, html.light {
    color-scheme: light;
    --c-surface:        247 248 250;
    --c-surface-raised: 255 255 255;
    --c-surface-sunken: 240 242 245;
    --c-surface-border: 223 226 232;
    --c-ink:            24 28 35;
    --c-muted:          96 106 120;
    --c-accent:         99 102 241;
    --c-accent-strong:  79 70 229;
    --c-highlight:      217 119 6;
    --c-success:        5 150 105;
    --c-danger:         225 29 72;
    --shadow-card: 0 1px 2px rgb(16 24 40 / 0.04), 0 1px 3px rgb(16 24 40 / 0.08);
    --shadow-lift: 0 6px 16px -4px rgb(16 24 40 / 0.12), 0 2px 6px -2px rgb(16 24 40 / 0.08);
  }

  /* Dark theme (refined graphite). */
  html.dark {
    color-scheme: dark;
    --c-surface:        13 17 23;
    --c-surface-raised: 22 27 34;
    --c-surface-sunken: 9 12 17;
    --c-surface-border: 38 45 56;
    --c-ink:            230 237 243;
    --c-muted:          139 148 158;
    --c-accent:         99 102 241;
    --c-accent-strong:  129 140 248;
    --c-highlight:      245 158 11;
    --c-success:        16 185 129;
    --c-danger:         244 63 94;
    --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.35);
    --shadow-lift: 0 8px 24px -6px rgb(0 0 0 / 0.5);
  }

  body  { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  /* Smooth the theme switch. */
  body, .bg-surface, .bg-surface-raised, .bg-surface-sunken {
    transition: background-color 200ms ease, border-color 200ms ease;
  }

  /* ── Accessibility: visible keyboard focus, no rings on mouse click ── */
  :focus-visible {
    outline: 2px solid rgb(var(--c-accent));
    outline-offset: 2px;
    border-radius: 6px;
  }
  :focus:not(:focus-visible) { outline: none; }

  /* ── Respect reduced-motion (skill a11y CRITICAL) ──────────────────── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* ── Scrollbars — thin, neutral ─────────────────────────────────── */
  .scrollbar-thin::-webkit-scrollbar              { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb        { background: rgba(139,148,158,0.2); border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover  { background: rgba(139,148,158,0.35); }
  .scrollbar-thin::-webkit-scrollbar-track        { background: transparent; }

  /* ── Selection ───────────────────────────────────────────────────── */
  ::selection { background: rgb(var(--c-accent) / 0.28); color: rgb(var(--c-ink)); }

  /* ── htmx loading indicator ─────────────────────────────────────── */
  .htmx-indicator { opacity: 0; transition: opacity 150ms; }
  .htmx-request .htmx-indicator,
  .htmx-request.htmx-indicator { opacity: 1; }

  /* ── Active nav row (sidebar) ────────────────────────────────────── */
  /* Left 2px indigo bar + very subtle indigo background wash.
     Clean, like Linear's sidebar — unambiguous without being loud. */
  .page-nav[aria-current="page"] {
    background: rgb(var(--c-accent) / 0.10);
    color: rgb(var(--c-accent-strong)) !important;
    font-weight: 500;
    box-shadow: inset 2px 0 0 0 rgb(var(--c-accent));
  }
  .page-nav[aria-current="page"] svg { color: rgb(var(--c-accent-strong)); }

  /* Active tab pill (tab-style nav, e.g. Questions/History subtabs) */
  [aria-current="page"] {
    color: rgb(var(--c-accent)) !important;
    border-bottom-color: rgb(var(--c-accent)) !important;
  }

  /* ── Status pulse dot ────────────────────────────────────────────── */
  .pulse-dot {
    animation: pulseDot 2.4s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }

  /* ── Loading skeleton — neutral grey only ────────────────────────── */
  .skel {
    background: linear-gradient(
      90deg,
      rgba(139,148,158,0.06) 25%,
      rgba(139,148,158,0.12) 37%,
      rgba(139,148,158,0.06) 63%
    );
    background-size: 400% 100%;
    animation: shimmer 1.8s linear infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ── Toast animations ────────────────────────────────────────────── */
  @keyframes toast-in  { from { opacity:0; transform:translateX(6px); } to { opacity:1; transform:translateX(0); } }
  @keyframes toast-out { from { opacity:1; transform:translateX(0);   } to { opacity:0; transform:translateX(6px); } }
  .toast      { animation: toast-in  160ms ease-out both; }
  .toast.gone { animation: toast-out 180ms ease-in  both; }

  /* ── Command palette animations ──────────────────────────────────── */
  .cmdk-overlay { animation: fadeIn  100ms ease-out both; }
  .cmdk-panel   { animation: slideUp 180ms cubic-bezier(0.16,1,0.3,1) both; }

  /* ── Keyboard chips ──────────────────────────────────────────────── */
  kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 1.4em; height: 1.4em; padding: 0 0.3em;
    border: 1px solid rgb(var(--c-muted) / 0.3);
    border-bottom-width: 2px;
    border-radius: 4px;
    font: 0.7rem ui-monospace, "SF Mono", Menlo, monospace;
    background: rgb(var(--c-ink) / 0.05);
    color: rgb(var(--c-muted));
  }

  /* ── Page section fade-in on reveal ─────────────────────────────── */
  main#main section.page:not(.hidden) > * { animation: fadeIn 160ms ease-out both; }

  /* ── Details marker hidden globally ─────────────────────────────── */
  details > summary::-webkit-details-marker { display: none; }

  /* ── Workflow running state indicator ────────────────────────────── */
  /* Used by the status pill — a muted indigo ring, no glow */
  .brand-active { box-shadow: 0 0 0 1px rgb(var(--c-accent) / 0.4); }
</style>
</head>

<script>
  // Reflect the current theme preference on the toggle button (icon + tooltip).
  (function(){
    var ICONS = {
      system: '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
      light:  '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
      dark:   '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>'
    };
    window.goonSyncThemeButton = function(pref){
      var icon = document.getElementById('theme-toggle-icon');
      var btn  = document.getElementById('theme-toggle');
      if (icon) icon.innerHTML = ICONS[pref] || ICONS.system;
      if (btn)  btn.setAttribute('title', 'Theme: ' + pref + ' (click to change)');
    };
    var p; try { p = localStorage.getItem('goon-theme') || 'system'; } catch(e){ p='system'; }
    window.goonSyncThemeButton(p);
  })();
</script>

              role="tab" data-page-target="memory">
        <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>Memory</span>
      </button>

      <!-- Workspace group -->
      <div class="pt-4 pb-1 px-3 text-[10px] font-medium uppercase tracking-widest text-muted/50">Workspace</div>

      <button class="page-nav w-full text-left flex items-center gap-2.5 px-3 py-1.5 rounded-md
                     text-sm text-muted hover:text-ink hover:bg-surface-raised/60 transition"
              role="tab" data-page-target="files">
        <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Files</span>
      </button>

      <button class="page-nav w-full text-left flex items-center gap-2.5 px-3 py-1.5 rounded-md
                     text-sm text-muted hover:text-ink hover:bg-surface-raised/60 transition"
              role="tab" data-page-target="setup">
        <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Setup</span>
      </button>

      <div class="pt-4 pb-2 px-3 text-[10px] text-muted/40">
        <kbd>⌘K</kbd> / <kbd>Ctrl+K</kbd> to jump anywhere
      </div>
    </nav>

    <!-- Daemon status — auto-updates via SSE -->
    <div class="px-3 mt-auto mb-1">
      <div hx-get="/fragments/status-pill"
           hx-trigger="load, statusChanged from:body"
           class="rounded-md bg-surface-raised px-3 py-2.5">
        <div class="space-y-1.5">
          <div class="skel h-2 w-16"></div>
          <div class="skel h-1.5 w-12"></div>
        </div>
      </div>
    </div>

    <!-- Daemon controls -->
    <div class="px-3 pb-3 space-y-0.5">
      <button type="button"
              hx-post="/api/refresh"
              hx-target="#sidebar-action-result"
              hx-swap="innerHTML"
              class="w-full text-left flex items-center gap-2.5 px-3 py-1.5 rounded-md
                     text-xs text-muted hover:text-ink hover:bg-surface-raised/60 transition">
        <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        Refresh board
      </button>
      <button type="button"
              id="sidebar-pause-resume"
              onclick="goonDaemonToggle()"
              class="w-full text-left flex items-center gap-2.5 px-3 py-1.5 rounded-md
                     text-xs text-muted hover:text-ink hover:bg-surface-raised/60 transition">
        <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
        <span>Pause daemon</span>
      </button>
      <div id="sidebar-action-result" class="text-[11px] text-muted px-3"></div>
    </div>
  </aside>

  <!-- Mobile sidebar backdrop -->
  <div id="sidebar-backdrop"
       class="hidden fixed inset-0 z-20 bg-black/60 lg:hidden"
       onclick="closeMobileSidebar()"></div>

  <!-- Main content -->
  <main id="main" class="flex-1 min-w-0 px-5 lg:px-8 py-6">

    <template id="tpl-skeleton">
      <div class="space-y-3">
        <div class="skel h-4 w-32"></div>
        <div class="skel h-20 w-full"></div>
        <div class="skel h-3 w-2/3"></div>
        <div class="skel h-3 w-1/2"></div>
      </div>
    </template>

    <section data-page="dashboard" class="page" data-loaded="false"
             hx-get="/fragments/tab-dashboard"
             hx-trigger="reveal once, questionsChanged from:body, workflowsChanged from:body, ticketsChanged from:body, statusChanged from:body"
             hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="questions" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-questions" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="workflows" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-workflows" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="tickets" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-tickets" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="prs" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-prs" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="chat" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-chat" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="memory" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-memory" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="files" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-files" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>
    <section data-page="setup" class="page hidden" data-loaded="false"
             hx-get="/fragments/tab-config" hx-trigger="reveal once" hx-swap="innerHTML">
      <div class="space-y-3"><div class="skel h-4 w-32"></div><div class="skel h-20 w-full"></div><div class="skel h-3 w-2/3"></div></div>
    </section>

  </main>
</div>

<!-- Footer -->
<footer class="px-5 lg:px-8 py-6 mt-8 border-t border-surface-border/40">
  <div class="flex flex-wrap items-center gap-4 justify-between text-xs text-muted/60">
    <span>state at <code class="font-mono text-muted">./storage/memory.json</code></span>
    <div class="flex items-center gap-4">
      <a href="/docs" class="hover:text-ink transition">docs</a>
      <a href="https://github.com/harisaginting/goon" target="_blank" rel="noopener"
         class="hover:text-ink transition">github</a>
    </div>
  </div>
</footer>

<!-- Toast stack -->
<div id="toast-stack"
     class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-xs"
     aria-live="polite" aria-atomic="false"></div>

<!-- Command palette -->
<div id="cmdk" class="hidden fixed inset-0 z-50">
  <div class="cmdk-overlay absolute inset-0 bg-black/60" onclick="closeCmdk()"></div>
  <div class="cmdk-panel absolute top-20 left-1/2 -translate-x-1/2 w-full max-w-lg
              rounded-xl border border-surface-border bg-surface-raised shadow-lift overflow-hidden">
    <div class="flex items-center gap-2.5 px-4 py-3 border-b border-surface-border/60">
      <svg class="h-3.5 w-3.5 text-muted" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
      </svg>
      <input id="cmdk-input" type="text"
             placeholder="Search commands, tabs, tickets…"
             autocomplete="off" autocorrect="off" spellcheck="false"
             class="flex-1 bg-transparent text-sm text-ink focus:outline-none placeholder:text-muted/50">
      <kbd>esc</kbd>
    </div>
    <ul id="cmdk-results" class="max-h-72 overflow-y-auto scrollbar-thin py-1.5" role="listbox"></ul>
    <div class="px-4 py-2 border-t border-surface-border/60 text-xs text-muted/50 flex items-center gap-3">
      <span class="flex items-center gap-1"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span class="flex items-center gap-1"><kbd>↵</kbd> open</span>
      <span class="flex items-center gap-1"><kbd>esc</kbd> close</span>
    </div>
  </div>
</div>

<script>
  // ── Page (tab) switching ────────────────────────────────────────────────
  const _pageTitles = {
    dashboard: 'Home — goon',
    questions: 'Questions — goon',
    workflows: 'Workflows — goon',
    tickets:   'Tickets — goon',
    prs:       'Repositories — goon',
    chat:      'Chat — goon',
    memory:    'Memory — goon',
    files:     'Files — goon',
    setup:     'Setup — goon',
  };

  function showPage(name, opts) {
    document.querySelectorAll('main#main section.page').forEach(s => {
      s.classList.toggle('hidden', s.dataset.page !== name);
    });
    document.querySelectorAll('.page-nav').forEach(b => {
      const active = b.dataset.pageTarget === name;
      if (active) b.setAttribute('aria-current', 'page');
      else b.removeAttribute('aria-current');
    });
    const sec = document.querySelector(`main#main section.page[data-page="${name}"]`);
    if (sec && sec.dataset.loaded === 'false') {
      sec.dataset.loaded = 'true';
      requestAnimationFrame(() => { if (window.htmx) htmx.trigger(sec, 'reveal'); });
    }
    try { localStorage.setItem('goon.lastPage', name); } catch (_) {}
    if (!(opts && opts.skipHistory)) {
      const url = '/app/' + name;
      if (opts && opts.replace) history.replaceState({ page: name }, '', url);
      else history.pushState({ page: name }, '', url);
    }
    document.title = _pageTitles[name] ||
      (name.charAt(0).toUpperCase() + name.slice(1) + ' — goon');
    closeMobileSidebar();
  }

  document.querySelectorAll('.page-nav').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.pageTarget));
  });

  document.addEventListener('DOMContentLoaded', () => {
    let last = 'dashboard';
    const urlMatch = window.location.pathname.match(/\/app\/([^/]+)/);
    if (urlMatch && urlMatch[1]) {
      last = urlMatch[1];
    } else {
      try { last = localStorage.getItem('goon.lastPage') || 'dashboard'; } catch (_) {}
    }
    if (!document.querySelector(`section.page[data-page="${last}"]`)) last = 'dashboard';
    showPage(last, { replace: true });
  });

  window.addEventListener('popstate', (e) => {
    const name = (e.state && e.state.page) ||
      (window.location.pathname.match(/\/app\/([^/]+)/)||[])[1] ||
      'dashboard';
    const valid = document.querySelector(`section.page[data-page="${name}"]`);
    showPage(valid ? name : 'dashboard', { skipHistory: true });
  });

  document.getElementById('nav-toggle')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('sidebar').classList.add('fixed','inset-y-0','left-0','z-30','flex','top-12');
    document.getElementById('sidebar-backdrop').classList.toggle('hidden');
  });
  function closeMobileSidebar() {
    if (window.matchMedia('(min-width: 1024px)').matches) return;
    const sb = document.getElementById('sidebar');
    if (!sb) return;
    sb.classList.add('hidden');
    sb.classList.remove('fixed','inset-y-0','left-0','z-30','flex','top-12');
    document.getElementById('sidebar-backdrop')?.classList.add('hidden');
  }

  // ── Daemon pause/resume ─────────────────────────────────────────────────
  async function goonDaemonToggle() {
    const pill  = document.querySelector('[data-paused]');
    const paused = pill && pill.dataset.paused === '1';
    const action = paused ? 'resume' : 'pause';
    const r = await fetch('/api/daemon/' + action, { method: 'POST' });
    if (r.ok) {
      toast('daemon ' + action + 'd', 'ok');
      if (pill) pill.dataset.paused = paused ? '0' : '1';
      document.body.dispatchEvent(new CustomEvent('statusChanged'));
    } else {
      toast(action + ' failed', 'err');
    }
  }

  function syncPauseButton() {
    const pill = document.querySelector('[data-paused]');
    const btn  = document.getElementById('sidebar-pause-resume');
    if (!pill || !btn) return;
    const paused = pill.dataset.paused === '1';
    btn.querySelector('span').textContent = paused ? 'Resume daemon' : 'Pause daemon';
    btn.querySelector('svg').innerHTML = paused
      ? '<polygon points="5 3 19 12 5 21 5 3"/>'
      : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  }
  document.body.addEventListener('statusChanged',  syncPauseButton);
  document.body.addEventListener('htmx:afterSwap', syncPauseButton);

  // ── Brand mark active state ─────────────────────────────────────────────
  function syncBrandLive() {
    const pill = document.querySelector('[data-paused]');
    const mark = document.getElementById('brand-mark');
    if (!pill || !mark) return;
    const running = pill.dataset.running === '1' && pill.dataset.paused !== '1';
    mark.classList.toggle('brand-active', running);
  }
  document.body.addEventListener('statusChanged',  syncBrandLive);
  document.body.addEventListener('htmx:afterSwap', syncBrandLive);

  // ── Keyboard shortcuts ──────────────────────────────────────────────────
  const _letterToPage = {
    h: 'dashboard',
    q: 'questions', w: 'workflows', t: 'tickets', p: 'prs',
    c: 'chat',      m: 'memory',    f: 'files',   s: 'setup',
  };
  document.addEventListener('keydown', (e) => {
    const inField = e.target instanceof HTMLElement &&
      (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable);
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); openCmdk(); return;
    }
    if (inField) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const dest = _letterToPage[e.key.toLowerCase()];
    if (dest)          { e.preventDefault(); showPage(dest); }
    else if (e.key === '/') { e.preventDefault(); openCmdk(); }
    else if (e.key === '?') { e.preventDefault(); window.open('/docs', '_blank'); }
    else if (e.key === 'Escape') { closeCmdk(); }
  });

  // ── Command palette ─────────────────────────────────────────────────────
  const cmdkActions = [
    { label: 'Home',              hint: 'h', run: () => navTo('dashboard') },
    { label: 'Questions',         hint: 'q', run: () => navTo('questions') },
    { label: 'Workflows',         hint: 'w', run: () => navTo('workflows') },
    { label: 'Tickets',           hint: 't', run: () => navTo('tickets') },
    { label: 'Repositories',      hint: 'p', run: () => navTo('prs') },
    { label: 'Chat',              hint: 'c', run: () => navTo('chat') },
    { label: 'Memory',            hint: 'm', run: () => navTo('memory') },
    { label: 'Files',             hint: 'f', run: () => navTo('files') },
    { label: 'Setup',             hint: 's', run: () => navTo('setup') },
    { label: 'Refresh tickets',   hint: 'POST /api/refresh',        run: doRefresh },
    { label: 'Pause daemon',      hint: 'POST /api/daemon/pause',   run: () => doDaemon('pause') },
    { label: 'Resume daemon',     hint: 'POST /api/daemon/resume',  run: () => doDaemon('resume') },
    { label: 'Documentation',     hint: 'docs',                     run: () => window.open('/docs', '_blank') },
  ];

  function navTo(name)  { showPage(name); closeCmdk(); }
  function openCmdk()   {
    document.getElementById('cmdk').classList.remove('hidden');
    document.getElementById('cmdk-input').value = '';
    document.getElementById('cmdk-input').focus();
    renderCmdk('');
  }
  function closeCmdk()  { document.getElementById('cmdk').classList.add('hidden'); }
  document.getElementById('cmdk-open').addEventListener('click', openCmdk);

  let cmdkIdx = 0;
  function renderCmdk(query) {
    const q = query.toLowerCase();
    const results = cmdkActions.filter(a =>
      !q || a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q));
    cmdkIdx = 0;
    const ul = document.getElementById('cmdk-results');
    if (results.length === 0) {
      ul.innerHTML = '<li class="px-4 py-2.5 text-sm text-muted/60">no matches</li>';
      return;
    }
    ul.innerHTML = results.map((a, i) => `
      <li role="option" data-i="${i}"
          class="cmdk-item flex items-center justify-between px-4 py-2 cursor-pointer
                 ${i === 0 ? 'bg-accent/10 text-ink' : 'text-muted hover:bg-surface-sunken hover:text-ink'}">
        <span class="text-sm">${escapeHtml(a.label)}</span>
        <span class="text-xs text-muted/50 font-mono">${escapeHtml(a.hint)}</span>
      </li>`).join('');
    ul.querySelectorAll('.cmdk-item').forEach((el) => {
      el.addEventListener('click', () => results[+el.dataset.i].run());
      el.addEventListener('mouseenter', () => moveCmdk(+el.dataset.i, results));
    });
  }
  function moveCmdk(i, results) {
    cmdkIdx = i;
    document.querySelectorAll('.cmdk-item').forEach((el, idx) => {
      if (idx === i) {
        el.classList.add('bg-accent/10','text-ink');
        el.classList.remove('text-muted','hover:bg-surface-sunken','hover:text-ink');
      } else {
        el.classList.remove('bg-accent/10','text-ink');
        el.classList.add('text-muted','hover:bg-surface-sunken','hover:text-ink');
      }
    });
  }
  document.getElementById('cmdk-input').addEventListener('input', (e) => renderCmdk(e.target.value));
  document.getElementById('cmdk-input').addEventListener('keydown', (e) => {
    const items = document.querySelectorAll('.cmdk-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); if (cmdkIdx < items.length-1) moveCmdk(cmdkIdx+1, cmdkActionsFiltered()); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); if (cmdkIdx > 0)              moveCmdk(cmdkIdx-1, cmdkActionsFiltered()); }
    if (e.key === 'Enter')     { e.preventDefault(); const r=cmdkActionsFiltered(); if (r[cmdkIdx]) r[cmdkIdx].run(); }
    if (e.key === 'Escape')    { closeCmdk(); }
  });
  function cmdkActionsFiltered() {
    const q = document.getElementById('cmdk-input').value.toLowerCase();
    return cmdkActions.filter(a => !q || a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q));
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  // ── Toast notifications ─────────────────────────────────────────────────
  function toast(message, kind) {
    const tone = {
      ok:   'bg-emerald-500/12 text-emerald-400 border-emerald-500/25',
      err:  'bg-rose-500/12    text-rose-400    border-rose-500/25',
      warn: 'bg-amber-500/12   text-amber-400   border-amber-500/25',
      info: 'bg-indigo-500/12  text-indigo-400  border-indigo-500/25',
    }[kind || 'info'];
    const icon = { ok: '✓', err: '✗', warn: '⚠', info: 'i' }[kind || 'info'];
    const el = document.createElement('div');
    el.className = `toast pointer-events-auto rounded-lg border px-3 py-2.5 text-sm
                    shadow-card flex items-center gap-2.5 ${tone}`;
    el.innerHTML = `<span class="text-xs font-mono leading-none opacity-70">${icon}</span>
                    <span class="flex-1">${escapeHtml(message)}</span>`;
    document.getElementById('toast-stack').appendChild(el);
    setTimeout(() => {
      el.classList.add('gone');
      setTimeout(() => el.remove(), 220);
    }, 3000);
  }

  // ── Misc helpers wired by server-rendered fragments ─────────────────────
  async function doRefresh() {
    closeCmdk();
    const r = await fetch('/api/refresh', { method: 'POST' });
    if (r.ok) toast('tickets refreshed', 'ok');
    else toast('refresh failed', 'err');
  }
  async function doDaemon(action) {
    closeCmdk();
    const r = await fetch('/api/daemon/' + action, { method: 'POST' });
    if (r.ok) toast('daemon ' + action + (action.endsWith('e') ? 'd' : 'ed'), 'ok');
    else toast(action + ' failed', 'err');
  }

  // ── Event → toast mapping ───────────────────────────────────────────────
  const _toastCooldown = new Map();
  function toastOnce(name, msg, kind) {
    const now = Date.now();
    if (now - (_toastCooldown.get(name) || 0) < 400) return;
    _toastCooldown.set(name, now);
    toast(msg, kind);
  }
  document.body.addEventListener('statusChanged',    () => toastOnce('statusChanged',    'daemon state changed', 'info'));
  document.body.addEventListener('questionsChanged', () => toastOnce('questionsChanged', 'approvals updated',    'ok'));
  document.body.addEventListener('workflowsChanged', () => toastOnce('workflowsChanged', 'workflow updated',     'ok'));
  document.body.addEventListener('configChanged',    () => toastOnce('configChanged',    'config saved',         'ok'));
  document.body.addEventListener('ticketsChanged',   () => toastOnce('ticketsChanged',   'tickets refreshed',    'ok'));
  document.body.addEventListener('prsChanged',       () => toastOnce('prsChanged',       'pull requests updated','ok'));
  document.body.addEventListener('configError', (e) => toast(e.detail?.message || 'config error', 'err'));

  // ── Fragment helpers (called from server-rendered HTML) ─────────────────
  window.goonWorkflowEditorToggle = function() {
    var ed  = document.getElementById('wf-editor');
    var lbl = document.getElementById('wf-editor-toggle-label');
    if (!ed) return;
    var opening = ed.classList.contains('hidden');
    ed.classList.toggle('hidden');
    if (lbl) lbl.textContent = opening ? 'hide editor' : 'view / edit';
    if (opening) {
      var ta = ed.querySelector('textarea');
      if (ta) setTimeout(function(){ ta.focus(); ta.setSelectionRange(0,0); }, 30);
    }
  };

  window.goonPRRowToggle = function(btn, formId) {
    var el = document.getElementById(formId);
    if (!el) return;
    var isOpen = !el.classList.contains('hidden');
    if (isOpen) {
      el.classList.add('hidden');
      btn.setAttribute('data-disclose', 'closed');
      btn.setAttribute('aria-expanded', 'false');
      var ic = btn.querySelector('[data-disclose-icon]');
      if (ic) ic.textContent = '▸';
    } else {
      el.classList.remove('hidden');
      btn.setAttribute('data-disclose', 'open');
      btn.setAttribute('aria-expanded', 'true');
      var ic2 = btn.querySelector('[data-disclose-icon]');
      if (ic2) ic2.textContent = '▾';
      var ta = el.querySelector('textarea, input[type=text]');
      if (ta) setTimeout(function(){ ta.focus(); }, 30);
    }
  };

  window.goonJumpToQuestion = function(qid) {
    showPage('questions');
    closeCmdk();
    var tries = 0;
    function scroll() {
      var el = document.querySelector('[data-question-id="' + qid + '"]');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.classList.add('ring-2','ring-accent','ring-offset-2','ring-offset-surface');
        setTimeout(function(){
          el.classList.remove('ring-2','ring-accent','ring-offset-2','ring-offset-surface');
        }, 2400);
        return;
      }
      if (tries++ < 20) setTimeout(scroll, 150);
    }
    scroll();
  };

  // --- PR comment / request-changes modal editor --------------------------
  // One shared overlay drives every PR card's "write comment" and
  // "request changes" buttons. Gives a roomy editor + inline AI draft,
  // replacing the cramped 2–3 row inline textareas. Submits via fetch so
  // we don't fight htmx target resolution for owner/repo ids.
  (function(){
    var st = { repo:'', number:0, mode:'comment' };
    function el(id){ return document.getElementById(id); }
    function decodeEntities(s){
      var t = document.createElement('textarea'); t.innerHTML = s; return t.value;
    }
    function close(){
      var m = el('pr-modal'); if (m) m.classList.add('hidden');
      document.body.style.overflow = '';
    }
    window.goonPRModalClose = close;

    window.goonPRModal = function(mode, repo, number, title){
      st.mode = mode; st.repo = repo; st.number = number;
      var isComment = mode === 'comment';
      el('pr-modal-title').textContent = (isComment ? 'Comment on ' : 'Request changes on ') + repo + ' #' + number;
      el('pr-modal-sub').textContent = title || '';
      var ta = el('pr-modal-body');
      ta.value = '';
      ta.placeholder = isComment ? 'Write a comment… (Markdown supported)' : 'Explain what needs to change…';
      el('pr-modal-status').textContent = '';
      el('pr-modal-status').className = 'text-xs text-muted';
      // AI draft only makes sense for a review comment.
      el('pr-modal-draft').style.display = isComment ? '' : 'none';
      el('pr-modal-draft-spin').classList.add('hidden');
      var send = el('pr-modal-send');
      send.textContent = isComment ? 'Send comment →' : 'Request changes →';
      send.className = 'rounded-md px-4 py-2 text-sm font-semibold transition ' +
        (isComment ? 'bg-accent text-surface hover:brightness-110'
                   : 'bg-rose-500 text-white hover:bg-rose-600');
      el('pr-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      setTimeout(function(){ ta.focus(); }, 30);
    };

    window.goonPRModalDraft = function(){
      var ta = el('pr-modal-body');
      var spin = el('pr-modal-draft-spin');
      var btn = el('pr-modal-draft');
      spin.classList.remove('hidden'); btn.disabled = true;
      el('pr-modal-status').textContent = '';
      fetch('/api/pr/draft-review?repo=' + encodeURIComponent(st.repo) + '&number=' + st.number)
        .then(function(r){ return r.text(); })
        .then(function(txt){ ta.value = decodeEntities(txt); ta.focus(); })
        .catch(function(e){
          el('pr-modal-status').textContent = '✗ draft failed: ' + e;
          el('pr-modal-status').className = 'text-xs text-rose-400';
        })
        .finally(function(){ spin.classList.add('hidden'); btn.disabled = false; });
    };

    window.goonPRModalSend = function(){
      var body = el('pr-modal-body').value.trim();
      var status = el('pr-modal-status');
      if (!body){ status.textContent = 'Write something first.'; status.className='text-xs text-amber-400'; return; }
      var url = st.mode === 'comment' ? '/api/pr/comment' : '/api/pr/request-changes';
      var send = el('pr-modal-send'); send.disabled = true;
      status.textContent = 'Sending…'; status.className = 'text-xs text-muted';
      var form = new URLSearchParams();
      form.set('repo', st.repo); form.set('number', String(st.number)); form.set('body', body);
      fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: form.toString() })
        .then(function(r){ return r.text().then(function(t){ return { ok:r.ok, t:t }; }); })
        .then(function(res){
          if (res.ok && res.t.indexOf('✗') < 0){
            close();
            // Closing the modal is the success signal — don't fire
            // prsChanged (it reloaded the whole PR list / collapsed the panel).
            try { if (window.toast) toast('comment submitted', 'ok'); } catch(e){}
          } else {
            status.innerHTML = res.t || '✗ failed';
            status.className = 'text-xs text-rose-400';
          }
        })
        .catch(function(e){ status.textContent = '✗ ' + e; status.className='text-xs text-rose-400'; })
        .finally(function(){ send.disabled = false; });
    };

    document.addEventListener('keydown', function(e){
      var m = el('pr-modal');
      if (!m || m.classList.contains('hidden')) return;
      if (e.key === 'Escape') close();
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); window.goonPRModalSend(); }
    });
  })();
</script>

<!-- Shared PR comment / request-changes modal (driven by goonPRModal) -->
<div id="pr-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="goonPRModalClose()"></div>
  <div class="relative w-full max-w-2xl rounded-2xl border border-surface-border bg-surface-raised shadow-2xl">
    <div class="flex items-start justify-between gap-3 border-b border-surface-border px-5 py-3">
      <div class="min-w-0">
        <div id="pr-modal-title" class="text-sm font-semibold text-white truncate">Comment</div>
        <div id="pr-modal-sub" class="text-[11px] text-muted truncate"></div>
      </div>
      <button type="button" onclick="goonPRModalClose()" class="shrink-0 rounded-md p-1 text-muted hover:text-white hover:bg-surface transition" title="Close (Esc)">✕</button>
    </div>
    <div class="px-5 py-4">
      <textarea id="pr-modal-body" rows="12"
        class="w-full resize-y font-mono text-sm rounded-lg border border-surface-border bg-surface px-3 py-2 focus:border-accent focus:ring-1 focus:ring-accent/30 focus:outline-none"
        placeholder="Write a comment…"></textarea>
    </div>
    <div class="flex flex-wrap items-center gap-2 border-t border-surface-border px-5 py-3">
      <button type="button" id="pr-modal-draft" onclick="goonPRModalDraft()"
        class="inline-flex items-center gap-1 text-xs rounded-md border border-accent/40 text-accent px-2.5 py-1.5 hover:bg-accent/10 transition disabled:opacity-50">✨ Draft with AI</button>
      <span id="pr-modal-draft-spin" class="hidden text-xs text-muted">drafting…</span>
      <span id="pr-modal-status" class="text-xs text-muted"></span>
      <span class="flex-1"></span>
      <span class="text-[10px] text-muted/60 hidden sm:inline">⌘/Ctrl+Enter to send</span>
      <button type="button" onclick="goonPRModalClose()" class="text-sm rounded-md border border-surface-border px-3 py-2 hover:border-accent hover:text-accent transition">Cancel</button>
      <button type="button" id="pr-modal-send" onclick="goonPRModalSend()" class="rounded-md bg-accent text-surface px-4 py-2 text-sm font-semibold hover:brightness-110 transition">Send →</button>
    </div>
  </div>
</div>

<script>
  // Loading resilience — never leave a fragment stuck on "Loading…".
  // Give every htmx request a ceiling, and on timeout / network / server
  // error replace the target with a clear, retryable message instead of
  // an eternal spinner.
  (function(){
    if (window.htmx) { try { htmx.config.timeout = 20000; } catch(e){} } // 20s ceiling
    function failBox(target){
      if(!target || !target.innerHTML) return;
      target.innerHTML = '<div class="rounded-lg border border-rose-500/30 bg-rose-500/5 p-3 text-sm text-rose-400 flex items-center justify-between gap-3">'
        + '<span>Couldn’t load this — the server may be busy or unreachable.</span>'
        + '<button type="button" class="shrink-0 rounded-md border border-rose-500/40 px-2 py-1 text-xs hover:bg-rose-500/10 transition" '
        + 'onclick="(function(b){var c=b.closest(\'[hx-get]\')||b.closest(\'[data-hx-get]\');if(c&&window.htmx)htmx.trigger(c,\'load\');})(this)">retry</button>'
        + '</div>';
    }
    ['htmx:timeout','htmx:responseError','htmx:sendError'].forEach(function(ev){
      document.body.addEventListener(ev, function(e){
        var d = e.detail || {};
        // Only replace content for GET fragment loads. POST forms manage
        // their own inline error/result slots — don't clobber them.
        var verb = (d.requestConfig && d.requestConfig.verb || '').toLowerCase();
        if (verb && verb !== 'get') return;
        failBox(d.target || d.elt);
      });
    });
  })();
</script>
